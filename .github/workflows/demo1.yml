name: Hello World
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: print hello world
        run: echo " this is build job"

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: print hello world
        run: echo " this is test job"

  deploy:
    runs-on: ubuntu-latest
    name: test
    steps:
      - name: print hello world
        run: echo " this is deploy job"
        
